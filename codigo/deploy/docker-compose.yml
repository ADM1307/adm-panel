# =====================================================================
#  ADM · Despliegue del Panel de Control con Caddy
#  Levanta:  docker compose up -d     ·     Baja:  docker compose down
#  HTTPS automático (Let's Encrypt) si tu dominio apunta a este VPS.
# =====================================================================
services:
  panel:
    image: caddy:2.8
    container_name: adm_panel
    restart: unless-stopped
    ports:
      - "80:80"      # requerido para el reto ACME (HTTPS automático)
      - "443:443"    # HTTPS
      - "443:443/udp"# HTTP/3
      - "8080:8080"  # acceso rápido por IP (quítalo en prod si no lo usas)
    environment:
      PANEL_DOMAIN: ${PANEL_DOMAIN:-panel.atlasdigitalmark.com}
      PANEL_USER: ${PANEL_USER:-adm}
      PANEL_PASSWORD_HASH: ${PANEL_PASSWORD_HASH:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./site:/srv:ro                 # aquí vive index.html (el panel)
      - caddy_data:/data               # certificados TLS (persisten)
      - caddy_config:/config
      - ./logs:/var/log/caddy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
