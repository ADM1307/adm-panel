name: Motor de Ventas ADM (gratis)

# Corre el ciclo del motor en los servidores de GitHub (gratis para repos).
# - Cada 15 min (cron) y también a mano (workflow_dispatch).

on:
  schedule:
    - cron: "*/15 * * * *"   # cada 15 minutos (UTC)
  workflow_dispatch:

concurrency:
  group: motor-ventas
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ciclo:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSL: "true"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
      WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
      CAL_LINK: ${{ secrets.CAL_LINK }}
      USAR_IA: ${{ vars.USAR_IA }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Instalar dependencias
        run: |
          (cd services/scraper && npm install --no-audit --no-fund)
          (cd agent && npm install --no-audit --no-fund)
          (cd services/outreach && npm install --no-audit --no-fund)

      - name: Prospectar 24/7 (OpenStreetMap gratis + Google si hay llave)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(date -u +%M)" -lt 15 ]; then
            node services/scraper/src/osm.js || true
            if [ -n "$GOOGLE_PLACES_API_KEY" ]; then node services/scraper/src/index.js || true; fi
          else
            echo "scraper: ya corrio esta hora"
          fi

      - name: Calificar + Ofertar (IA si hay llave, si no por reglas GRATIS)
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            node agent/src/qualify.js || true
            node agent/src/offer.js   || true
          else
            node agent/src/qualify_reglas.js || true
          fi

      - name: Enriquecer con Google Places (contacto de los que no tienen · si hay llave)
        if: ${{ env.GOOGLE_PLACES_API_KEY != '' }}
        run: node services/scraper/src/enrich_places.js || true

      - name: Enriquecer contactos (buscar correo en su web · gratis)
        run: node agent/src/enrich.js || true

      - name: Redactar outreach (plantillas gratis / IA opcional)
        run: node agent/src/personalize.js || true

      # El contacto SOLO sale de 9:00 a 14:00 (Chihuahua), via config horario_envio.
      - name: Enviar correo (Resend solo 9-2)
        if: ${{ env.RESEND_API_KEY != '' }}
        run: node services/outreach/src/email.js || true

      - name: Enviar WhatsApp (solo 9-2)
        if: ${{ env.WHATSAPP_TOKEN != '' }}
        run: node services/outreach/src/whatsapp.js || true

      - name: Responder a quienes contestaron
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: node agent/src/reply.js || true

      - name: Exportar estado al panel (data.json)
        run: node agent/src/export_dashboard.js --out=./data.json || true

      - name: Publicar panel en vivo
        run: |
          git config user.name "adm-motor"
          git config user.email "motor@atlasdigitalmark.com"
          git add data.json
          git commit -m "motor: actualizar panel en vivo [skip ci]" || echo "sin cambios"
          git push || true
